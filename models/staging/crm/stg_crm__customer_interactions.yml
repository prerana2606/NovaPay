version: 2

models:
  - name: stg_crm__customer_interactions
    description: Cleaned customer interaction records from CRM source
    columns:
      - name: interaction_sk
        description: Surrogate key for the interaction record
        tests:
          - unique
          - not_null

      - name: interaction_id
        description: Natural key from CRM source
        tests:
          - not_null

      - name: customer_id
        description: Foreign key to stg_crm__customers
        tests:
          - not_null
          - relationships:
              to: ref('stg_crm__customers')
              field: customer_id
