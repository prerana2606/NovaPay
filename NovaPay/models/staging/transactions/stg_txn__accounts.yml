version: 2

models:
  - name: stg_txn__accounts
    description: Cleaned account records from transactional source
    columns:
      - name: account_sk
        description: Surrogate key for the account record
        tests:
          - unique
          - not_null

      - name: account_id
        description: Natural key from transactional source
        tests:
          - not_null

      - name: customer_id
        description: Foreign key to stg_crm__customers
        tests:
          - not_null
          - relationships:
              to: ref('stg_crm__customers')
              field: customer_id

      - name: account_status
        description: Current status of the account
        tests:
          - not_null
          - accepted_values:
              values:
                - active
                - closed
                - suspended
